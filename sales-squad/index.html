<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Pipeline Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- ─── HEADER ──────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <a href="../index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          <img src="../img/logo-rjp.svg" class="logo-img" alt="RJP Logo">
        </a>
        <span class="logo-text">SALES <strong>PIPELINE CALCULATOR</strong></span>
      </div>
      <nav class="app-nav">
        <button class="nav-item active" data-section="dashboard">Dashboard</button>
        <button class="nav-item" data-section="activity">Activity</button>
        <button class="nav-item" data-section="pipeline">Pipeline</button>
        <button class="nav-item" data-section="reports">Reports</button>
        <button class="nav-item" data-section="settings">Settings</button>
        <a href="../index.html" class="nav-item nav-home" style="text-decoration:none; margin-left:12px; border-left:1px solid rgba(255,255,255,0.1); padding-left:20px;">AI Tools</a>
      </nav>
    </div>
  </header>

  <!-- ─── MAIN ────────────────────────────────────────────────────────── -->
  <main class="app-main">
    <div id="section-dashboard" class="section active"></div>
    <div id="section-activity"  class="section"></div>
    <div id="section-pipeline"  class="section"></div>
    <div id="section-reports"   class="section"></div>
    <div id="section-settings"  class="section"></div>
  </main>

  <!-- ─── MODAL ───────────────────────────────────────────────────────── -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" onclick="App.closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ─── SCRIPTS ─────────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/metrics.js"></script>
  <script src="../js/charts.js"></script>
  <script src="../js/app.js"></script>

</body>
</html>
